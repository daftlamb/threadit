<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread It</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f0f; color: #ccc; font-family: Georgia, serif; overflow: hidden; }
#toolbar { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: #111; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 1000; }
.tb-btn { background: none; border: 1px solid #333; color: #888; padding: 4px 12px; font-size: 12px; cursor: pointer; letter-spacing: 1px; }
.tb-btn:hover { border-color: #888; color: #ddd; }
#tb-title { color: #555; font-size: 13px; letter-spacing: 2px; margin-right: auto; }
#drawflow-wrap { position: fixed; top: 44px; left: 0; right: 0; bottom: 60px; }
#drawflow { width: 100%; height: 100%; }
.drawflow { background: #0f0f0f; }
.drawflow .drawflow-node { background: transparent; border: none; padding: 0; }
.drawflow .drawflow-node.selected { background: transparent; }
.drawflow .connection .main-path { stroke: #444; stroke-width: 2; }
.thread-node { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 3px; min-width: 220px; font-family: Georgia, serif; }
.thread-node.status-active { border-color: #5a4010; }
.thread-node.status-done { border-color: #1a4a2a; }
.thread-node.status-dropped { border-color: #3a1a1a; opacity: 0.6; }
.node-header { padding: 8px 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.node-title { font-size: 13px; color: #ddd; outline: none; flex: 1; background: transparent; border: none; font-family: inherit; }
.node-status { font-size: 10px; padding: 2px 6px; border-radius: 2px; margin-left: 8px; flex-shrink: 0; cursor: pointer; }
.node-status.idea { background: #2a2a3a; color: #8a8aaa; }
.node-status.active { background: #3a2a0a; color: #c8a060; }
.node-status.done { background: #0a2a1a; color: #60a880; }
.node-status.dropped { background: #2a0a0a; color: #a86060; }
.node-body { padding: 8px 10px; display: none; }
.node-body.open { display: block; }
.node-content { width: 100%; min-height: 80px; background: #111; border: 1px solid #222; color: #aaa; font-size: 12px; resize: vertical; padding: 6px; font-family: inherit; line-height: 1.5; }
.node-content:focus { outline: none; border-color: #444; }
.node-footer { padding: 4px 10px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1a1a1a; }
.node-time { font-size: 10px; color: #444; }
#kw-overlay { position: fixed; top: 44px; left: 0; right: 0; bottom: 60px; pointer-events: none; z-index: 500; }
#timeline { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #111; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 20px; gap: 12px; z-index: 1000; }
#tl-track { flex: 1; height: 2px; background: #222; position: relative; cursor: pointer; }
#tl-scrubber { position: absolute; top: -8px; width: 2px; height: 18px; background: #888; cursor: ew-resize; transform: translateX(-50%); }
#tl-dots { position: absolute; top: -4px; left: 0; right: 0; height: 10px; }
#tl-label { font-size: 11px; color: #555; white-space: nowrap; min-width: 120px; }
</style>
</head>
<body>
<div id="toolbar">
  <span id="tb-title">THREAD IT</span>
  <button class="tb-btn" id="btn-add">+ NODE</button>
  <button class="tb-btn" id="btn-export">EXPORT</button>
  <button class="tb-btn" id="btn-import">IMPORT</button>
  <button class="tb-btn" id="btn-clear">CLEAR</button>
</div>
<div id="drawflow-wrap"><div id="drawflow"></div></div>
<svg id="kw-overlay"></svg>
<div id="timeline">
  <span id="tl-label">all time</span>
  <div id="tl-track">
    <svg id="tl-dots" width="100%" height="10"></svg>
    <div id="tl-scrubber"></div>
  </div>
</div>
<input type="file" id="import-file" accept=".json" style="display:none">
<script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
<script>
const dfEl = document.getElementById('drawflow');
const editor = new Drawflow(dfEl);
editor.reroute = true;
editor.start();
const nodeData = {};
const STATUS_CYCLE = ['idea','active','done','dropped'];
function formatTs(ts) {
  const d = new Date(ts);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')
    +' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function nodeHTML(title, status, ts) {
  return '<div class="thread-node status-'+status+'">'
    +'<div class="node-header">'
    +'<input class="node-title" value="'+title.replace(/"/g,'&quot;')+'" onclick="event.stopPropagation()" oninput="onTitleInput(event)">'
    +'<span class="node-status '+status+'" onclick="event.stopPropagation();cycleStatusEl(event)">'+status+'</span>'
    +'</div><div class="node-body">'
    +'<textarea class="node-content" placeholder="paste notes, links, #tags..." oninput="onContentInput(event)"></textarea>'
    +'</div><div class="node-footer"><span class="node-time">'+formatTs(ts)+'</span></div></div>';
}
function getDfNodeId(el) {
  const n = el.closest('.drawflow-node');
  return n ? parseInt(n.id.replace('node-','')) : null;
}
function onTitleInput(e) {
  const id = getDfNodeId(e.target);
  if (id && nodeData[id]) { nodeData[id].title = e.target.value; saveData(); }
}
function onContentInput(e) {
  const id = getDfNodeId(e.target);
  if (id && nodeData[id]) { nodeData[id].content = e.target.value; saveData(); updateKwOverlay(); }
}
function cycleStatusEl(e) {
  const id = getDfNodeId(e.target);
  if (!id || !nodeData[id]) return;
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(nodeData[id].status)+1) % STATUS_CYCLE.length];
  nodeData[id].status = next;
  e.target.className = 'node-status '+next; e.target.textContent = next;
  const wrap = e.target.closest('.thread-node');
  if (wrap) wrap.className = 'thread-node status-'+next;
  saveData();
}
dfEl.addEventListener('click', function(e) {
  const hdr = e.target.closest('.node-header');
  if (hdr && !e.target.classList.contains('node-title') && !e.target.classList.contains('node-status')) {
    const body = hdr.closest('.thread-node').querySelector('.node-body');
    if (body) body.classList.toggle('open');
  }
});
function addNode(x, y, title, content, status, ts) {
  title=title||'New Idea'; content=content||''; status=status||'idea'; ts=ts||Date.now();
  const id = editor.addNode('thread',1,1,x,y,'thread-node-wrap',{},nodeHTML(title,status,ts));
  nodeData[id] = {title:title,content:content,status:status,timestamp:ts};
  setTimeout(function() {
    const dfNode = dfEl.querySelector('.drawflow-node[id="node-'+id+'"]');
    if (dfNode) { const ta = dfNode.querySelector('.node-content'); if (ta) ta.value=content; }
    updateTimeline(); updateKwOverlay(); saveData();
  }, 60);
  return id;
}
function extractKeywords(text) {
  const m = (text||'').match(/#\w+/g);
  return m ? m.map(function(k){ return k.toLowerCase(); }) : [];
}
function getNodeCenter(id) {
  const wrap = dfEl.querySelector('.drawflow-node[id="node-'+id+'"]');
  if (!wrap) return null;
  const r=wrap.getBoundingClientRect(), cr=dfEl.getBoundingClientRect();
  return {x:r.left-cr.left+r.width/2, y:r.top-cr.top+r.height/2};
}
function updateKwOverlay() {
  const svg = document.getElementById('kw-overlay');
  svg.innerHTML = '';
  const ids = Object.keys(nodeData), kwMap = {};
  ids.forEach(function(id) {
    extractKeywords(nodeData[id].content).forEach(function(kw) {
      if (!kwMap[kw]) kwMap[kw]=[];
      if (!kwMap[kw].includes(id)) kwMap[kw].push(id);
    });
  });
  const drawn = new Set();
  Object.keys(kwMap).forEach(function(kw) {
    const grp = kwMap[kw];
    for (var i=0;i<grp.length;i++) for (var j=i+1;j<grp.length;j++) {
      const key=[grp[i],grp[j]].sort().join('-');
      if (drawn.has(key)) continue; drawn.add(key);
      const a=getNodeCenter(parseInt(grp[i])), b=getNodeCenter(parseInt(grp[j]));
      if (!a||!b) continue;
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',a.x); line.setAttribute('y1',a.y);
      line.setAttribute('x2',b.x); line.setAttribute('y2',b.y);
      line.setAttribute('stroke','#c8a060'); line.setAttribute('stroke-width','1');
      line.setAttribute('stroke-dasharray','4 4'); line.setAttribute('opacity','0.4');
      svg.appendChild(line);
    }
  });
}
var tlScrubTime=null, tlDragging=false;
function updateTimeline() {
  const dotsSvg=document.getElementById('tl-dots'), label=document.getElementById('tl-label'), scrubber=document.getElementById('tl-scrubber');
  dotsSvg.innerHTML='';
  const ids=Object.keys(nodeData);
  if (!ids.length) { label.textContent='no nodes'; return; }
  const times=ids.map(function(id){ return nodeData[id].timestamp; });
  const minT=Math.min.apply(null,times), maxT=Math.max.apply(null,times), range=maxT-minT||1;
  const W=document.getElementById('tl-track').offsetWidth||300;
  ids.forEach(function(id) {
    const x=((nodeData[id].timestamp-minT)/range)*W;
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',x); c.setAttribute('cy',5); c.setAttribute('r',3); c.setAttribute('fill','#555');
    dotsSvg.appendChild(c);
  });
  if (tlScrubTime!==null) {
    scrubber.style.left=((tlScrubTime-minT)/range*W)+'px'; label.textContent=formatTs(tlScrubTime);
    ids.forEach(function(id) {
      const n=dfEl.querySelector('.drawflow-node[id="node-'+id+'"]');
      if (n) n.style.opacity=nodeData[id].timestamp>tlScrubTime?'0.2':'1';
    });
  } else {
    scrubber.style.left=W+'px'; label.textContent='all time';
    ids.forEach(function(id) {
      const n=dfEl.querySelector('.drawflow-node[id="node-'+id+'"]');
      if (n) n.style.opacity='1';
    });
  }
}
var tlTrack=document.getElementById('tl-track');
tlTrack.addEventListener('mousedown',function(e){ tlDragging=true; moveScrubber(e); });
document.addEventListener('mousemove',function(e){ if(tlDragging) moveScrubber(e); });
document.addEventListener('mouseup',function(){ tlDragging=false; });
tlTrack.addEventListener('dblclick',function(){ tlScrubTime=null; updateTimeline(); });
function moveScrubber(e) {
  const rect=tlTrack.getBoundingClientRect(), frac=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  const ids=Object.keys(nodeData); if (!ids.length) return;
  const times=ids.map(function(id){ return nodeData[id].timestamp; });
  const minT=Math.min.apply(null,times), maxT=Math.max.apply(null,times);
  tlScrubTime=frac>=0.99?null:minT+frac*(maxT-minT); updateTimeline();
}
function saveData() {
  try { localStorage.setItem('threadit-data',JSON.stringify({nodes:nodeData,df:editor.export()})); } catch(e){}
}
function loadData() {
  try {
    const raw=localStorage.getItem('threadit-data'); if (!raw) return;
    const saved=JSON.parse(raw);
    if (saved.df) editor.import(saved.df);
    if (saved.nodes) Object.assign(nodeData,saved.nodes);
    setTimeout(function() {
      Object.keys(nodeData).forEach(function(id) {
        const dfNode=dfEl.querySelector('.drawflow-node[id="node-'+id+'"]');
        if (dfNode) { const ta=dfNode.querySelector('.node-content'); if (ta) ta.value=nodeData[id].content||''; }
      });
      updateTimeline(); updateKwOverlay();
    },200);
  } catch(e){}
}
document.getElementById('btn-add').addEventListener('click',function(){ addNode(200+Math.random()*200,100+Math.random()*150); });
document.getElementById('btn-export').addEventListener('click',function() {
  const blob=new Blob([JSON.stringify({nodes:nodeData,df:editor.export()},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='threadit-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
});
document.getElementById('btn-import').addEventListener('click',function(){ document.getElementById('import-file').click(); });
document.getElementById('import-file').addEventListener('change',function(e) {
  const file=e.target.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=function(ev) {
    try {
      const saved=JSON.parse(ev.target.result);
      editor.clear(); Object.keys(nodeData).forEach(function(k){ delete nodeData[k]; });
      if (saved.df) editor.import(saved.df);
      if (saved.nodes) Object.assign(nodeData,saved.nodes);
      setTimeout(function() {
        Object.keys(nodeData).forEach(function(id) {
          const dfNode=dfEl.querySelector('.drawflow-node[id="node-'+id+'"]');
          if (dfNode) { const ta=dfNode.querySelector('.node-content'); if (ta) ta.value=nodeData[id].content||''; }
        });
        updateTimeline(); updateKwOverlay();
      },200);
    } catch(err){ alert('Invalid JSON'); }
  };
  reader.readAsText(file); e.target.value='';
});
document.getElementById('btn-clear').addEventListener('click',function() {
  if (!confirm('Clear all nodes?')) return;
  editor.clear(); Object.keys(nodeData).forEach(function(k){ delete nodeData[k]; });
  tlScrubTime=null; updateTimeline(); updateKwOverlay(); saveData();
});
dfEl.addEventListener('dblclick',function(e) {
  if (!e.target.classList.contains('drawflow')&&e.target.id!=='drawflow') return;
  const rect=dfEl.getBoundingClientRect(), zoom=editor.zoom||1;
  addNode((e.clientX-rect.left-editor.canvas_x)/zoom,(e.clientY-rect.top-editor.canvas_y)/zoom);
});
document.addEventListener('keydown',function(e) {
  if ((e.key==='Delete'||e.key==='Backspace')&&document.activeElement===document.body) {
    const sel=editor.node_selected;
    if (sel) {
      const id=parseInt(sel.id.replace('node-',''));
      editor.removeNodeId('node-'+id); delete nodeData[id];
      updateTimeline(); updateKwOverlay(); saveData();
    }
  }
});
editor.on('translate',function(){ updateKwOverlay(); });
editor.on('zoom',function(){ updateKwOverlay(); });
loadData();
setTimeout(function(){ if (Object.keys(nodeData).length===0) addNode(300,200,'Origin','','idea'); },300);
</script>
</body>
</html>
