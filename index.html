<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread It</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/outfit/300.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;--text:#ccc;--text-muted:#555;--accent:#c8a060;--accent-dim:rgba(200,160,96,0.15);}
[data-theme="parchment"]{--bg:#f5f0e8;--surface:#ede8dc;--border:#d0c8b8;--text:#3a3020;--text-muted:#8a7a60;--accent:#8a6030;--accent-dim:rgba(138,96,48,0.12);}
[data-theme="dusk"]{--bg:#1a1020;--surface:#241830;--border:#3a2850;--text:#d0c0e0;--text-muted:#806090;--accent:#a080d0;--accent-dim:rgba(160,128,208,0.15);}
[data-theme="forest"]{--bg:#0a1410;--surface:#121e18;--border:#1e3028;--text:#b0d0b8;--text-muted:#507060;--accent:#60a870;--accent-dim:rgba(96,168,112,0.15);}
[data-theme="minimal"]{--bg:#fff;--surface:#f8f8f8;--border:#e0e0e0;--text:#222;--text-muted:#999;--accent:#555;--accent-dim:rgba(85,85,85,0.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;}
#toolbar{position:fixed;top:0;left:0;right:0;height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:1000;}
#btn-sidebar{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px 6px;}
#btn-sidebar:hover{color:var(--text);}
#tb-title{font-size:11px;letter-spacing:3px;color:var(--text-muted);margin-right:4px;}
.tab-btn{background:none;border:none;color:var(--text-muted);font-size:11px;letter-spacing:1px;cursor:pointer;padding:4px 10px;border-bottom:2px solid transparent;font-family:'Outfit',sans-serif;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
#search-input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:11px;padding:4px 10px;width:150px;outline:none;margin-left:auto;}
#search-input:focus{border-color:var(--accent);}
#search-input::placeholder{color:var(--text-muted);}
.theme-dot{width:11px;height:11px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.theme-dot.active{border-color:var(--text);}
.tb-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:3px 10px;font-size:10px;letter-spacing:1px;cursor:pointer;font-family:'Outfit',sans-serif;}
.tb-btn:hover{border-color:var(--accent);color:var(--text);}
#layout{position:fixed;top:44px;left:0;right:0;bottom:50px;display:flex;}
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.2s,min-width 0.2s;overflow:hidden;}
#sidebar.collapsed{width:0;min-width:0;}
#sidebar-inner{width:220px;display:flex;flex-direction:column;height:100%;}
#btn-new-project{margin:10px;padding:6px 10px;background:none;border:1px solid var(--border);color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;}
#btn-new-project:hover{border-color:var(--accent);color:var(--accent);}
#project-list{flex:1;overflow-y:auto;padding:0 8px 8px;}
.proj-item{padding:6px 8px;font-size:12px;cursor:pointer;border-radius:2px;display:flex;justify-content:space-between;align-items:center;color:var(--text-muted);}
.proj-item:hover{background:var(--accent-dim);color:var(--text);}
.proj-item.active{color:var(--accent);background:var(--accent-dim);}
.proj-count{font-size:10px;color:var(--text-muted);}
#canvas-wrap{flex:1;position:relative;overflow:hidden;}
#drawflow{width:100%;height:100%;}
.drawflow{background:var(--bg);background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:24px 24px;}
.drawflow .drawflow-node{background:transparent;border:none;padding:0;}
.drawflow .drawflow-node.selected .thread-node{border-color:var(--accent)!important;}
.drawflow .connection .main-path{stroke:var(--border);stroke-width:1.5;}
.thread-node{background:var(--surface);border:1px solid var(--border);border-radius:4px;min-width:200px;max-width:260px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;padding:10px 12px;}
.thread-node:hover{border-color:var(--text-muted);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.node-icon-title{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.node-icon{font-size:13px;flex-shrink:0;line-height:1;}
.node-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-muted);}
.node-ts{letter-spacing:0.3px;}
.node-tags{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.thread-node:hover{border-color:var(--text-muted);}
.thread-node.status-active{border-left:3px solid #c8a060;}
.thread-node.status-done{border-left:3px solid #60a870;}
.thread-node.status-dropped{border-left:3px solid #a06060;opacity:0.6;}
.thread-node.search-match{box-shadow:0 0 0 2px var(--accent);}
.node-header{padding:8px 10px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.node-title-text{font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.node-status{font-size:9px;padding:2px 6px;border-radius:2px;flex-shrink:0;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;}
.node-status.idea{background:#2a2a3a;color:#8a8aaa;}
.node-status.active{background:#3a2a0a;color:#c8a060;}
.node-status.done{background:#0a2a1a;color:#60a880;}
.node-status.dropped{background:#2a0a0a;color:#a86060;}
#relation-view{flex:1;display:none;position:relative;overflow:hidden;background:var(--bg);}
#relation-view.visible{display:block;}
#relation-svg{width:100%;height:100%;}
#right-panel{width:480px;min-width:300px;max-width:70vw;background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.2s;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#right-panel.open{transform:translateX(0);}
#rp-header{padding:12px 14px 8px;border-bottom:1px solid var(--border);}
#rp-title-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
#rp-title{flex:1;font-size:20px;font-weight:300;color:var(--text);outline:none;background:transparent;border:none;font-family:'Outfit',sans-serif;line-height:1.3;}
#rp-status{font-size:10px;padding:3px 8px;border-radius:2px;cursor:pointer;flex-shrink:0;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;}
#rp-close{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;flex-shrink:0;line-height:1;}
#rp-close:hover{color:var(--text);}
#rp-editor-toolbar{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;}
.ed-btn{background:none;border:1px solid var(--border);color:var(--text-muted);font-size:10px;padding:2px 7px;cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:0.5px;}
.ed-btn:hover{border-color:var(--accent);color:var(--accent);}
#rp-editor{flex:1;padding:14px;overflow-y:auto;outline:none;font-size:13px;line-height:1.7;color:var(--text);}
#rp-editor:empty::before{content:attr(data-placeholder);color:var(--text-muted);pointer-events:none;}
#rp-editor mark.link-anchor{background:var(--accent-dim);color:var(--accent);border-radius:2px;padding:0 2px;cursor:pointer;}
#rp-editor img{max-width:100%;border-radius:2px;margin:4px 0;display:block;}
#rp-editor h1{font-size:18px;font-weight:400;margin:8px 0 4px;}
#rp-editor h2{font-size:15px;font-weight:400;margin:6px 0 3px;}
#rp-editor ul{padding-left:18px;}
#rp-tags-area{padding:8px 14px;border-top:1px solid var(--border);}
#rp-tags-input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:11px;width:100%;}
#rp-tags-input::placeholder{color:var(--text-muted);}
.tag-pill{display:inline-block;background:var(--accent-dim);color:var(--accent);font-size:10px;padding:2px 7px;border-radius:10px;margin:2px;}
#rp-footer{padding:6px 14px;border-top:1px solid var(--border);}
#rp-timestamp{font-size:10px;color:var(--text-muted);}
#kw-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;}
#timeline{position:fixed;bottom:0;left:0;right:0;height:50px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;z-index:1000;}
#tl-range{font-size:10px;color:var(--text-muted);min-width:80px;}
#tl-track{flex:1;height:2px;background:var(--border);position:relative;cursor:pointer;}
#tl-scrubber{position:absolute;top:50%;transform:translate(-50%,-50%) rotate(45deg);width:8px;height:8px;background:var(--text-muted);cursor:ew-resize;}
#tl-dots{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:20px;}
#tl-pos{font-size:10px;color:var(--text-muted);min-width:100px;text-align:right;}
.tl-tooltip{position:absolute;bottom:16px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:10px;padding:2px 6px;white-space:nowrap;pointer-events:none;transform:translateX(-50%);}

#rp-resize{position:absolute;left:0;top:0;bottom:0;width:4px;cursor:ew-resize;background:transparent;z-index:10;}
#rp-resize:hover{background:var(--accent);}
</style>
</head>
<body>
<div id="toolbar">
  <button id="btn-sidebar">☰</button>
  <span id="tb-title">THREAD IT</span>
  <button class="tab-btn active" id="tab-canvas">CANVAS</button>
  <button class="tab-btn" id="tab-relations">RELATIONS</button>
  <input id="search-input" type="text" placeholder="search nodes...">
  <div id="theme-dots" style="display:flex;gap:5px;align-items:center;">
    <div class="theme-dot active" data-theme="ink" style="background:#c8a060;" title="ink"></div>
    <div class="theme-dot" data-theme="parchment" style="background:#8a6030;" title="parchment"></div>
    <div class="theme-dot" data-theme="dusk" style="background:#a080d0;" title="dusk"></div>
    <div class="theme-dot" data-theme="forest" style="background:#60a870;" title="forest"></div>
    <div class="theme-dot" data-theme="minimal" style="background:#999;" title="minimal"></div>
  </div>
  <button class="tb-btn" id="btn-add">+ NODE</button>
  <button class="tb-btn" id="btn-export">EXPORT</button>
  <button class="tb-btn" id="btn-import">IMPORT</button>
</div>
<div id="layout">
  <div id="sidebar">
    <div id="sidebar-inner">
      <button id="btn-new-project">＋ PROJECT</button>
      <div id="project-list"></div>
    </div>
  </div>
  <div id="canvas-wrap">
    <div id="drawflow"></div>
    <svg id="kw-overlay"></svg>
  </div>
  <div id="relation-view">
    <svg id="relation-svg"></svg>
  </div>
  <div id="right-panel"><div id="rp-resize"></div>
    <div id="rp-header">
      <div id="rp-title-row">
        <div id="rp-title" contenteditable="true" spellcheck="false"></div>
        <span id="rp-status" class="node-status idea">idea</span>
        <button id="rp-close">×</button>
      </div>
    </div>
    <div id="rp-editor-toolbar">
      <button class="ed-btn" data-cmd="bold">B</button>
      <button class="ed-btn" data-cmd="italic">I</button>
      <button class="ed-btn" data-cmd="h1">H1</button>
      <button class="ed-btn" data-cmd="h2">H2</button>
      <button class="ed-btn" data-cmd="ul">UL</button>
      <button class="ed-btn" data-cmd="anchor">🔗</button>
      <button class="ed-btn" data-cmd="image">📷</button>
    </div>
    <div id="rp-editor" contenteditable="true" data-placeholder="write notes, paste links, use #tags..."></div>
    <div id="rp-tags-area">
      <div id="rp-tags-pills"></div>
      <input id="rp-tags-input" type="text" placeholder="#add tags...">
    </div>
    <div id="rp-footer"><span id="rp-timestamp"></span></div>
  </div>
</div>
<div id="timeline">
  <span id="tl-range">—</span>
  <div id="tl-track">
    <svg id="tl-dots" width="100%" height="20"></svg>
    <div id="tl-scrubber" style="left:100%;"></div>
  </div>
  <span id="tl-pos">all time</span>
</div>
<input type="file" id="import-file" accept=".json" style="display:none">
<input type="file" id="image-file" accept="image/*" style="display:none">
<script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
<script>
const dfEl = document.getElementById('drawflow');
const editor = new Drawflow(dfEl);
editor.reroute = true;
editor.start();

const nodeData = {};
let projects = ['Default'];
let currentProject = 'All';
let activeNodeId = null;
let tlScrubTime = null;
let tlDragging = false;
const STATUS_CYCLE = ['idea','active','done','dropped'];

function uid() { return Math.random().toString(36).slice(2,10); }
function formatTs(ts) {
  const d = new Date(ts);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')
    +' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// Node HTML (compact card only)
function nodeHTML(id) {
  const d = nodeData[id] || {};
  const status = d.status || 'idea';
  const title = (d.title || 'New Idea').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const icons = {idea:'○', active:'◐', done:'●', dropped:'✕'};
  const icon = icons[status] || '○';
  const ts = d.timestamp ? formatTs(d.timestamp).slice(5,16) : '';
  const tags = (d.tags||[]).slice(0,3).join(' ');
  return '<div class="thread-node status-'+status+'" data-nid="'+id+'">'
    +'<div class="node-icon-title">'
    +'<span class="node-icon" style="color:var(--accent)">'+icon+'</span>'
    +'<span class="node-title-text">'+title+'</span>'
    +'</div>'
    +'<div class="node-meta">'
    +'<span class="node-ts">'+ts+'</span>'
    +'<span class="node-tags">'+tags+'</span>'
    +'<span class="node-status '+status+'" data-nid="'+id+'" style="margin-left:auto">'+status+'</span>'
    +'</div>'
    +'</div>';
}

function addNode(x, y, data) {
  const id = uid();
  nodeData[id] = Object.assign({
    title: 'New Idea', content: '', status: 'idea',
    timestamp: Date.now(), tags: [], project: currentProject === 'All' ? 'Default' : currentProject,
    anchors: []
  }, data);
  const dfId = editor.addNode('thread',1,1,x,y,'',{},nodeHTML(id));
  nodeData[id]._dfId = dfId;
  // map dfId -> our id
  dfIdMap[dfId] = id;
  setTimeout(() => { attachNodeClick(dfId, id); updateTimeline(); updateKwOverlay(); saveData(); }, 80);
  return id;
}

const dfIdMap = {};

function attachNodeClick(dfId, nid) {
  const el = dfEl.querySelector('.drawflow-node[id="node-'+dfId+'"]');
  if (!el) return;
  el.addEventListener('click', function(e) {
    if (e.target.classList.contains('node-status')) {
      e.stopPropagation();
      cycleStatus(nid);
      return;
    }
    openPanel(nid);
  });
}

function cycleStatus(nid) {
  if (!nodeData[nid]) return;
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(nodeData[nid].status)+1) % STATUS_CYCLE.length];
  nodeData[nid].status = next;
  refreshNodeCard(nid);
  if (activeNodeId === nid) updatePanelStatus();
  saveData();
}

function refreshNodeCard(nid) {
  const d = nodeData[nid]; if (!d) return;
  const dfId = d._dfId;
  const el = dfEl.querySelector('.drawflow-node[id="node-'+dfId+'"] .thread-node');
  if (!el) return;
  el.className = 'thread-node status-'+d.status;
  const titleEl = el.querySelector('.node-title-text');
  if (titleEl) titleEl.textContent = d.title;
  const statusEl = el.querySelector('.node-status');
  if (statusEl) { statusEl.className = 'node-status '+d.status; statusEl.textContent = d.status; }
}

// RIGHT PANEL
function openPanel(nid) {
  activeNodeId = nid;
  const d = nodeData[nid]; if (!d) return;
  document.getElementById('rp-title').textContent = d.title;
  document.getElementById('rp-editor').innerHTML = d.content || '';
  updatePanelStatus();
  renderTagPills(d.tags || []);
  document.getElementById('rp-timestamp').textContent = formatTs(d.timestamp);
  document.getElementById('right-panel').classList.add('open');
}

function closePanel() {
  savePanelToNode();
  document.getElementById('right-panel').classList.remove('open');
  activeNodeId = null;
}

function savePanelToNode() {
  if (!activeNodeId || !nodeData[activeNodeId]) return;
  nodeData[activeNodeId].title = document.getElementById('rp-title').textContent.trim() || 'Untitled';
  nodeData[activeNodeId].content = document.getElementById('rp-editor').innerHTML;
  // extract tags from content
  const text = document.getElementById('rp-editor').innerText || '';
  const tagMatches = text.match(/#\w+/g) || [];
  nodeData[activeNodeId].tags = [...new Set(tagMatches.map(t=>t.toLowerCase()))];
  refreshNodeCard(activeNodeId);
  updateKwOverlay();
  saveData();
}

function updatePanelStatus() {
  if (!activeNodeId) return;
  const s = nodeData[activeNodeId].status;
  const el = document.getElementById('rp-status');
  el.className = 'node-status '+s; el.textContent = s;
}

function renderTagPills(tags) {
  const pills = document.getElementById('rp-tags-pills');
  pills.innerHTML = tags.map(t=>'<span class="tag-pill">'+t+'</span>').join('');
}

document.getElementById('rp-close').addEventListener('click', closePanel);
document.getElementById('rp-status').addEventListener('click', function() {
  if (!activeNodeId) return;
  cycleStatus(activeNodeId);
});
document.getElementById('rp-title').addEventListener('input', function() {
  if (activeNodeId && nodeData[activeNodeId]) {
    nodeData[activeNodeId].title = this.textContent.trim();
    refreshNodeCard(activeNodeId);
    saveData();
  }
});
document.getElementById('rp-editor').addEventListener('input', function() {
  if (activeNodeId && nodeData[activeNodeId]) {
    nodeData[activeNodeId].content = this.innerHTML;
    const text = this.innerText || '';
    const tagMatches = text.match(/#\w+/g) || [];
    nodeData[activeNodeId].tags = [...new Set(tagMatches.map(t=>t.toLowerCase()))];
    renderTagPills(nodeData[activeNodeId].tags);
    updateKwOverlay();
    saveData();
  }
});

// Editor toolbar
document.getElementById('rp-editor-toolbar').addEventListener('click', function(e) {
  const btn = e.target.closest('.ed-btn'); if (!btn) return;
  const cmd = btn.dataset.cmd;
  const ed = document.getElementById('rp-editor');
  ed.focus();
  if (cmd === 'bold') document.execCommand('bold');
  else if (cmd === 'italic') document.execCommand('italic');
  else if (cmd === 'h1') document.execCommand('formatBlock', false, 'h1');
  else if (cmd === 'h2') document.execCommand('formatBlock', false, 'h2');
  else if (cmd === 'ul') document.execCommand('insertUnorderedList');
  else if (cmd === 'anchor') {
    const sel = window.getSelection();
    if (sel && sel.toString().length > 0) {
      const anchorId = uid();
      document.execCommand('insertHTML', false,
        '<mark class="link-anchor" data-anchor="'+anchorId+'">'+sel.toString()+'</mark>');
      if (activeNodeId && nodeData[activeNodeId]) {
        nodeData[activeNodeId].anchors = nodeData[activeNodeId].anchors || [];
        nodeData[activeNodeId].anchors.push({id: anchorId, text: sel.toString()});
        saveData();
      }
    }
  }
  else if (cmd === 'image') document.getElementById('image-file').click();
});

document.getElementById('image-file').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('rp-editor').focus();
    document.execCommand('insertHTML', false, '<img src="'+ev.target.result+'" style="max-width:100%">');
    if (activeNodeId && nodeData[activeNodeId]) {
      nodeData[activeNodeId].content = document.getElementById('rp-editor').innerHTML;
      saveData();
    }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// PROJECT SIDEBAR
function renderProjects() {
  const list = document.getElementById('project-list');
  const counts = {};
  Object.values(nodeData).forEach(d => { counts[d.project] = (counts[d.project]||0)+1; });
  const all = [['All', Object.keys(nodeData).length], ...projects.map(pr=>[pr, counts[pr]||0])];
  list.innerHTML = all.map(([name, cnt]) =>
    '<div class="proj-item'+(currentProject===name?' active':'')+'" data-proj="'+name+'">'
    +'<span>'+name+'</span><span class="proj-count">'+cnt+'</span></div>'
  ).join('');
}

document.getElementById('project-list').addEventListener('click', function(e) {
  const item = e.target.closest('.proj-item'); if (!item) return;
  currentProject = item.dataset.proj;
  renderProjects();
  filterCanvasByProject();
  saveData();
});

document.getElementById('btn-new-project').addEventListener('click', function() {
  const name = prompt('Project name:'); if (!name || !name.trim()) return;
  const n = name.trim();
  if (!projects.includes(n)) { projects.push(n); saveData(); }
  currentProject = n;
  renderProjects();
  filterCanvasByProject();
});

function filterCanvasByProject() {
  Object.keys(nodeData).forEach(nid => {
    const d = nodeData[nid];
    const dfId = d._dfId;
    const el = dfEl.querySelector('.drawflow-node[id="node-'+dfId+'"]');
    if (!el) return;
    const show = currentProject === 'All' || d.project === currentProject;
    el.style.display = show ? '' : 'none';
  });
  updateKwOverlay();
}

// SEARCH
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  Object.keys(nodeData).forEach(nid => {
    const d = nodeData[nid];
    const dfId = d._dfId;
    const el = dfEl.querySelector('.drawflow-node[id="node-'+dfId+'"]');
    if (!el) return;
    if (!q) { el.style.opacity=''; el.querySelector('.thread-node').classList.remove('search-match'); return; }
    const match = (d.title||'').toLowerCase().includes(q) ||
      (d.content||'').toLowerCase().includes(q) ||
      (d.tags||[]).some(t=>t.includes(q));
    el.style.opacity = match ? '1' : '0.2';
    el.querySelector('.thread-node').classList.toggle('search-match', match);
  });
});

// KEYWORD OVERLAY
function extractTags(content) {
  const text = content.replace(/<[^>]+>/g,' ');
  const m = text.match(/#\w+/g);
  return m ? m.map(t=>t.toLowerCase()) : [];
}

function getNodeCenter(dfId) {
  const el = dfEl.querySelector('.drawflow-node[id="node-'+dfId+'"]');
  if (!el || el.style.display==='none') return null;
  const r = el.getBoundingClientRect();
  const cr = dfEl.getBoundingClientRect();
  return {x: r.left-cr.left+r.width/2, y: r.top-cr.top+r.height/2};
}

function updateKwOverlay() {
  const svg = document.getElementById('kw-overlay');
  svg.innerHTML = '';
  const ids = Object.keys(nodeData);
  const kwMap = {};
  ids.forEach(nid => {
    extractTags(nodeData[nid].content||'').forEach(kw => {
      if (!kwMap[kw]) kwMap[kw] = [];
      if (!kwMap[kw].includes(nid)) kwMap[kw].push(nid);
    });
  });
  const drawn = new Set();
  Object.values(kwMap).forEach(grp => {
    for (let i=0;i<grp.length;i++) for (let j=i+1;j<grp.length;j++) {
      const key = [grp[i],grp[j]].sort().join('-');
      if (drawn.has(key)) continue; drawn.add(key);
      const a = getNodeCenter(nodeData[grp[i]]._dfId);
      const b = getNodeCenter(nodeData[grp[j]]._dfId);
      if (!a||!b) continue;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',a.x); line.setAttribute('y1',a.y);
      line.setAttribute('x2',b.x); line.setAttribute('y2',b.y);
      line.setAttribute('stroke','#c8a060'); line.setAttribute('stroke-width','1');
      line.setAttribute('stroke-dasharray','4 4'); line.setAttribute('opacity','0.4');
      svg.appendChild(line);
    }
  });
}

editor.on('translate', updateKwOverlay);
editor.on('zoom', updateKwOverlay);

// TIMELINE
function updateTimeline() {
  const dotsSvg = document.getElementById('tl-dots');
  const rangeEl = document.getElementById('tl-range');
  const posEl = document.getElementById('tl-pos');
  const scrubber = document.getElementById('tl-scrubber');
  dotsSvg.innerHTML = '';
  const ids = Object.keys(nodeData);
  if (!ids.length) { rangeEl.textContent='—'; return; }
  const times = ids.map(nid=>nodeData[nid].timestamp);
  const minT = Math.min(...times), maxT = Math.max(...times), range = maxT-minT||1;
  const W = document.getElementById('tl-track').offsetWidth || 300;
  rangeEl.textContent = formatTs(minT).slice(0,10);
  ids.forEach(nid => {
    const x = ((nodeData[nid].timestamp-minT)/range)*W;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','tl-dot-g');
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',x); c.setAttribute('cy',10); c.setAttribute('r',3);
    c.setAttribute('fill','var(--text-muted)'); c.style.cursor='pointer';
    const title = document.createElementNS('http://www.w3.org/2000/svg','title');
    title.textContent = nodeData[nid].title;
    c.appendChild(title);
    c.addEventListener('click',()=>openPanel(nid));
    g.appendChild(c); dotsSvg.appendChild(g);
  });
  if (tlScrubTime !== null) {
    const sx = ((tlScrubTime-minT)/range)*W;
    scrubber.style.left = sx+'px';
    posEl.textContent = formatTs(tlScrubTime);
    ids.forEach(nid => {
      const el = dfEl.querySelector('.drawflow-node[id="node-'+nodeData[nid]._dfId+'"]');
      if (el) el.style.opacity = nodeData[nid].timestamp > tlScrubTime ? '0.15' : '';
    });
  } else {
    scrubber.style.left = W+'px';
    posEl.textContent = 'all time';
    ids.forEach(nid => {
      const el = dfEl.querySelector('.drawflow-node[id="node-'+nodeData[nid]._dfId+'"]');
      if (el) el.style.opacity = '';
    });
  }
}

const tlTrack = document.getElementById('tl-track');
tlTrack.addEventListener('mousedown', e=>{ tlDragging=true; moveScrubber(e); });
document.addEventListener('mousemove', e=>{ if(tlDragging) moveScrubber(e); });
document.addEventListener('mouseup', ()=>{ tlDragging=false; });
tlTrack.addEventListener('dblclick', ()=>{ tlScrubTime=null; updateTimeline(); });

function moveScrubber(e) {
  const rect = tlTrack.getBoundingClientRect();
  const frac = Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width));
  const ids = Object.keys(nodeData); if (!ids.length) return;
  const times = ids.map(nid=>nodeData[nid].timestamp);
  const minT = Math.min(...times), maxT = Math.max(...times);
  tlScrubTime = frac >= 0.99 ? null : minT + frac*(maxT-minT);
  updateTimeline();
}

// RELATION VIEW (force graph)
let relNodes = [], relEdges = [], relAnim = null;

function buildRelationGraph() {
  const ids = Object.keys(nodeData);
  relNodes = ids.map(nid => ({
    id: nid, title: nodeData[nid].title,
    x: 100+Math.random()*600, y: 100+Math.random()*400,
    vx: 0, vy: 0
  }));
  relEdges = [];
  // tag-based edges
  const kwMap = {};
  ids.forEach(nid => {
    extractTags(nodeData[nid].content||'').forEach(kw => {
      if (!kwMap[kw]) kwMap[kw]=[];
      if (!kwMap[kw].includes(nid)) kwMap[kw].push(nid);
    });
  });
  const drawn = new Set();
  Object.values(kwMap).forEach(grp => {
    for (let i=0;i<grp.length;i++) for (let j=i+1;j<grp.length;j++) {
      const key=[grp[i],grp[j]].sort().join('-');
      if (!drawn.has(key)) { drawn.add(key); relEdges.push({a:grp[i],b:grp[j],type:'tag'}); }
    }
  });
}

function tickRelation() {
  const W = document.getElementById('relation-svg').clientWidth || 800;
  const H = document.getElementById('relation-svg').clientHeight || 500;
  const k = 0.05, rep = 3000, damp = 0.85;
  for (let i=0;i<relNodes.length;i++) {
    for (let j=i+1;j<relNodes.length;j++) {
      const dx=relNodes[j].x-relNodes[i].x, dy=relNodes[j].y-relNodes[i].y;
      const d2=dx*dx+dy*dy+1, f=rep/d2;
      relNodes[i].vx-=f*dx; relNodes[i].vy-=f*dy;
      relNodes[j].vx+=f*dx; relNodes[j].vy+=f*dy;
    }
  }
  relEdges.forEach(e => {
    const a=relNodes.find(n=>n.id===e.a), b=relNodes.find(n=>n.id===e.b);
    if (!a||!b) return;
    const dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    const f=(d-120)*k;
    a.vx+=f*dx/d; a.vy+=f*dy/d;
    b.vx-=f*dx/d; b.vy-=f*dy/d;
  });
  relNodes.forEach(n => {
    n.vx*=damp; n.vy*=damp;
    n.x=Math.max(60,Math.min(W-60,n.x+n.vx));
    n.y=Math.max(30,Math.min(H-30,n.y+n.vy));
  });
  renderRelationSVG();
  relAnim = requestAnimationFrame(tickRelation);
}

function renderRelationSVG() {
  const svg = document.getElementById('relation-svg');
  svg.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);
  relEdges.forEach(e => {
    const a=relNodes.find(n=>n.id===e.a), b=relNodes.find(n=>n.id===e.b);
    if (!a||!b) return;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',a.x); line.setAttribute('y1',a.y);
    line.setAttribute('x2',b.x); line.setAttribute('y2',b.y);
    line.setAttribute('stroke','#c8a060'); line.setAttribute('stroke-width','1');
    line.setAttribute('stroke-dasharray','4 4'); line.setAttribute('opacity','0.5');
    svg.appendChild(line);
  });
  relNodes.forEach(n => {
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    g.addEventListener('click',()=>openPanel(n.id));
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',n.x); c.setAttribute('cy',n.y); c.setAttribute('r',18);
    c.setAttribute('fill','var(--surface)'); c.setAttribute('stroke','var(--border)');
    c.setAttribute('stroke-width','1.5');
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',n.x); t.setAttribute('y',n.y+4);
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','10');
    t.setAttribute('fill','var(--text)'); t.setAttribute('font-family','Outfit,sans-serif');
    t.textContent = n.title.slice(0,12)+(n.title.length>12?'…':'');
    g.appendChild(c); g.appendChild(t); svg.appendChild(g);
  });
}

// TABS
document.getElementById('tab-canvas').addEventListener('click', function() {
  this.classList.add('active');
  document.getElementById('tab-relations').classList.remove('active');
  document.getElementById('canvas-wrap').style.display='';
  document.getElementById('relation-view').classList.remove('visible');
  if (relAnim) { cancelAnimationFrame(relAnim); relAnim=null; }
});

document.getElementById('tab-relations').addEventListener('click', function() {
  this.classList.add('active');
  document.getElementById('tab-canvas').classList.remove('active');
  document.getElementById('canvas-wrap').style.display='none';
  document.getElementById('relation-view').classList.add('visible');
  buildRelationGraph();
  if (relAnim) cancelAnimationFrame(relAnim);
  relAnim = requestAnimationFrame(tickRelation);
});

// SIDEBAR TOGGLE
document.getElementById('btn-sidebar').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('collapsed');
  setTimeout(updateKwOverlay, 220);
});

// THEME
document.getElementById('theme-dots').addEventListener('click', function(e) {
  const dot = e.target.closest('.theme-dot'); if (!dot) return;
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));
  dot.classList.add('active');
  const theme = dot.dataset.theme;
  document.documentElement.setAttribute('data-theme', theme==='ink'?'':theme);
  localStorage.setItem('threadit-theme', theme);
});

// ADD NODE
document.getElementById('btn-add').addEventListener('click', function() {
  const x=200+Math.random()*300, y=100+Math.random()*200;
  addNode(x, y);
  renderProjects();
});

// DOUBLE CLICK canvas to add
dfEl.addEventListener('dblclick', function(e) {
  if (!e.target.classList.contains('drawflow') && e.target.id!=='drawflow') return;
  const rect=dfEl.getBoundingClientRect(), zoom=editor.zoom||1;
  addNode((e.clientX-rect.left-editor.canvas_x)/zoom, (e.clientY-rect.top-editor.canvas_y)/zoom);
  renderProjects();
});

// DELETE key
document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') { closePanel(); return; }
  if ((e.key==='Delete'||e.key==='Backspace') && document.activeElement===document.body) {
    const sel=editor.node_selected;
    if (sel) {
      const dfId=parseInt(sel.id.replace('node-',''));
      const nid=dfIdMap[dfId];
      editor.removeNodeId('node-'+dfId);
      if (nid) delete nodeData[nid];
      updateTimeline(); updateKwOverlay(); renderProjects(); saveData();
    }
  }
  if ((e.ctrlKey||e.metaKey) && e.key==='b') { document.execCommand('bold'); e.preventDefault(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='i') { document.execCommand('italic'); e.preventDefault(); }
});

// EXPORT / IMPORT
document.getElementById('btn-export').addEventListener('click', function() {
  const blob=new Blob([JSON.stringify({nodeData,projects,currentProject},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='threadit-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
});
document.getElementById('btn-import').addEventListener('click', ()=>document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', function(e) {
  const file=e.target.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=function(ev) {
    try {
      const saved=JSON.parse(ev.target.result);
      editor.clear();
      Object.keys(nodeData).forEach(k=>delete nodeData[k]);
      Object.keys(dfIdMap).forEach(k=>delete dfIdMap[k]);
      if (saved.projects) { projects.length=0; saved.projects.forEach(p=>projects.push(p)); }
      if (saved.currentProject) currentProject=saved.currentProject;
      if (saved.nodeData) {
        Object.entries(saved.nodeData).forEach(([nid,d]) => {
          nodeData[nid]=d;
          const dfId=editor.addNode('thread',1,1,d._x||200,d._y||200,'',{},nodeHTML(nid));
          nodeData[nid]._dfId=dfId; dfIdMap[dfId]=nid;
          setTimeout(()=>attachNodeClick(dfId,nid),80);
        });
      }
      setTimeout(()=>{ renderProjects(); updateTimeline(); updateKwOverlay(); },200);
    } catch(err){ alert('Invalid JSON'); }
  };
  reader.readAsText(file); e.target.value='';
});

// SAVE / LOAD
function saveData() {
  const toSave={nodeData:{},projects,currentProject};
  Object.entries(nodeData).forEach(([nid,d])=>{
    const dfId=d._dfId;
    const el=dfEl.querySelector('.drawflow-node[id="node-'+dfId+'"]');
    const pos=el?{x:parseInt(el.style.left)||0,y:parseInt(el.style.top)||0}:{x:200,y:200};
    toSave.nodeData[nid]=Object.assign({},d,{_x:pos.x,_y:pos.y});
  });
  try { localStorage.setItem('threadit-v3',JSON.stringify(toSave)); } catch(e){}
}

function loadData() {
  try {
    const raw=localStorage.getItem('threadit-v3'); if (!raw) return false;
    const saved=JSON.parse(raw);
    if (saved.projects) { projects.length=0; saved.projects.forEach(p=>projects.push(p)); }
    if (saved.currentProject) currentProject=saved.currentProject;
    if (saved.nodeData && Object.keys(saved.nodeData).length>0) {
      Object.entries(saved.nodeData).forEach(([nid,d])=>{
        nodeData[nid]=d;
        const dfId=editor.addNode('thread',1,1,d._x||200,d._y||200,'',{},nodeHTML(nid));
        nodeData[nid]._dfId=dfId; dfIdMap[dfId]=nid;
        setTimeout(()=>attachNodeClick(dfId,nid),80);
      });
      return true;
    }
  } catch(e){}
  return false;
}

// THEME restore
const savedTheme=localStorage.getItem('threadit-theme')||'ink';
if (savedTheme && savedTheme!=='ink') {
  document.documentElement.setAttribute('data-theme',savedTheme);
  document.querySelectorAll('.theme-dot').forEach(d=>{
    d.classList.toggle('active',d.dataset.theme===savedTheme);
  });
}

// INIT
const hasData=loadData();
setTimeout(()=>{
  if (!hasData) addNode(300,200,{title:'Origin',status:'idea'});
  renderProjects();
  updateTimeline();
  updateKwOverlay();
},300);

// Right panel resize
(function(){
  const handle = document.getElementById('rp-resize');
  const panel = document.getElementById('right-panel');
  let dragging = false, startX = 0, startW = 0;
  handle.addEventListener('mousedown', function(e){
    dragging = true; startX = e.clientX; startW = panel.offsetWidth;
    document.body.style.cursor = 'ew-resize'; e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){
    if (!dragging) return;
    const diff = startX - e.clientX;
    const newW = Math.max(300, Math.min(window.innerWidth*0.7, startW + diff));
    panel.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', function(){ 
    dragging = false; document.body.style.cursor = '';
  });
})();
</script>
